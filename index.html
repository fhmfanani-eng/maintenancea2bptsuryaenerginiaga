<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNIT CARE HEAVY EQUIPMENT — Mechanic Maintenance A2B Panel</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2315171b'/%3E%3Cpath d='M22.7 10.3a4 4 0 0 0-5.4 5.4l-8.6 8.6a2 2 0 1 0 2.8 2.8l8.6-8.6a4 4 0 0 0 5.4-5.4l-3 3-2-2 3-3z' fill='none' stroke='%23FFC72C' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#15171b;
  --panel:#1e2126;
  --panel-2:#252932;
  --line:#33383f;
  --yellow:#FFC72C;
  --yellow-dim:#8a6f1c;
  --orange:#FF6B35;
  --blue:#4A90D9;
  --green:#4CAF6D;
  --red:#E5484D;
  --text:#EDEEF0;
  --text-dim:#9AA0A8;
  --text-faint:#5C636B;
  --radius:3px;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  background:
    radial-gradient(ellipse at top left, rgba(255,199,44,0.04), transparent 45%),
    var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  font-size:14px;
}
::selection{ background:var(--yellow); color:#15171b; }
.diamond-plate{
  background-image:
    repeating-linear-gradient(45deg, rgba(255,255,255,0.015) 0, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 12px),
    repeating-linear-gradient(-45deg, rgba(255,255,255,0.015) 0, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 12px);
}
.app{ display:flex; min-height:100vh; }

/* SIDEBAR */
.sidebar{
  width:230px; flex-shrink:0;
  background:#121417;
  border-right:1px solid var(--line);
  display:flex; flex-direction:column;
  position:sticky; top:0; height:100vh;
}
.brand{
  padding:22px 20px 18px;
  border-bottom:1px solid var(--line);
}
.brand .logo-badge{
  background:#fff; border-radius:6px; padding:8px 10px; margin-bottom:12px;
  display:inline-flex; align-items:center; justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.35);
}
.brand .logo-badge img{ display:block; height:34px; width:auto; }
#login-overlay .logo-badge{ background:#fff; border-radius:6px; padding:6px 10px; display:inline-flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,0.35); }
#login-overlay .logo-badge img{ display:block; height:28px; width:auto; }
.brand .mark{
  font-family:'Oswald',sans-serif; font-weight:700; font-size:15.5px;
  letter-spacing:0.6px; color:var(--yellow); display:flex; align-items:center; gap:8px;
  line-height:1.25;
}
.brand .mark svg{ flex-shrink:0; }
#login-overlay .mark{ font-family:'Oswald',sans-serif; font-weight:700; letter-spacing:0.6px; color:var(--yellow); line-height:1.3; }
#login-overlay .sub{ font-size:9.5px; color:var(--text-faint); letter-spacing:1.5px; margin-top:6px; text-transform:uppercase; font-family:'JetBrains Mono',monospace; line-height:1.4; }
.brand .sub{ font-size:9.5px; color:var(--text-faint); letter-spacing:1.5px; margin-top:5px; text-transform:uppercase; font-family:'JetBrains Mono',monospace; line-height:1.4;}
.nav{ flex:1; padding:14px 10px; display:flex; flex-direction:column; gap:2px; }
.nav-item{
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:var(--radius);
  color:var(--text-dim); cursor:pointer; font-size:13px; font-weight:500;
  border-left:2px solid transparent;
  transition:background .12s, color .12s;
  user-select:none;
}
.nav-item .num{ display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; flex-shrink:0; color:var(--text-faint);}
.nav-item .num svg{ width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.nav-item:hover{ background:var(--panel-2); color:var(--text); }
.nav-item.active{ background:linear-gradient(90deg, rgba(255,199,44,0.12), transparent); color:var(--yellow); border-left:2px solid var(--yellow); }
.nav-item.active .num{ color:var(--yellow); }
.sidebar-foot{
  padding:14px 20px; border-top:1px solid var(--line);
  font-size:10px; color:var(--text-faint); font-family:'JetBrains Mono',monospace; letter-spacing:1px;
}
.status-dot{ width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; margin-right:6px; box-shadow:0 0 6px var(--green); }

/* MAIN */
.main{ flex:1; min-width:0; }
.topbar{
  height:60px; border-bottom:1px solid var(--line);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 28px; background:var(--panel);
}
.topbar h1{ font-family:'Oswald',sans-serif; font-size:18px; font-weight:600; letter-spacing:0.5px; }
.topbar .meta{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); }
.content{ padding:26px 28px 60px; max-width:1400px; }
.view{ display:none; animation:fadein .18s ease; }
.view.active{ display:block; }
@keyframes fadein{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

/* PANELS / CARDS */
.panel{
  background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
  padding:20px; margin-bottom:20px;
}
.panel-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px;}
.panel-head h2{ font-family:'Oswald',sans-serif; font-size:15px; font-weight:600; letter-spacing:0.6px; text-transform:uppercase; color:var(--text); display:flex; align-items:center; gap:8px;}
.panel-head h2 .tag{ font-family:'JetBrains Mono',monospace; font-size:10px; background:var(--yellow); color:#15171b; padding:2px 6px; border-radius:2px; font-weight:700;}
.grid{ display:grid; gap:16px; }
.grid-4{ grid-template-columns:repeat(4,1fr); }
.grid-5{ grid-template-columns:repeat(5,1fr); }
.grid-3{ grid-template-columns:repeat(3,1fr); }
.grid-2{ grid-template-columns:repeat(2,1fr); }
@media(max-width:1100px){ .grid-4{grid-template-columns:repeat(2,1fr);} .grid-3{grid-template-columns:repeat(2,1fr);} .grid-5{grid-template-columns:repeat(2,1fr);} }

/* FORM */
label{ display:block; font-size:11px; color:var(--text-dim); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.5px; font-weight:500;}
input, select, textarea{
  width:100%; background:var(--panel-2); border:1px solid var(--line); color:var(--text);
  padding:9px 10px; border-radius:var(--radius); font-family:'Inter',sans-serif; font-size:13px;
  outline:none; transition:border-color .12s;
}
input:focus, select:focus, textarea:focus{ border-color:var(--yellow); }
input:disabled, select:disabled, textarea:disabled{ opacity:0.65; cursor:not-allowed; background:var(--panel); }
.field{ margin-bottom:14px; }
textarea{ resize:vertical; min-height:56px; }
.btn{
  background:var(--yellow); color:#15171b; border:none; padding:10px 18px;
  font-weight:700; font-size:12px; letter-spacing:0.5px; text-transform:uppercase;
  border-radius:var(--radius); cursor:pointer; font-family:'Oswald',sans-serif;
  transition:filter .12s; display:inline-flex; align-items:center; gap:6px;
}
.btn:hover{ filter:brightness(1.1); }
.btn.secondary{ background:transparent; color:var(--text-dim); border:1px solid var(--line); }
.btn.secondary:hover{ color:var(--text); border-color:var(--text-dim); }
.btn.danger{ background:transparent; color:var(--red); border:1px solid var(--red); padding:5px 9px; font-size:10px;}
.btn.small{ padding:5px 10px; font-size:10px; }

/* TABLE */
.table-wrap{ overflow-x:auto; border:1px solid var(--line); border-radius:var(--radius); }
table{ width:100%; border-collapse:collapse; font-size:12.5px; min-width:900px; }
th{
  background:var(--panel-2); text-align:left; padding:10px 12px; font-family:'JetBrains Mono',monospace;
  font-size:10px; text-transform:uppercase; letter-spacing:0.6px; color:var(--text-dim); border-bottom:1px solid var(--line);
  white-space:nowrap;
}
td{ padding:9px 12px; border-bottom:1px solid var(--line); color:var(--text); white-space:nowrap; }
tbody tr:hover{ background:rgba(255,255,255,0.02); }
tbody tr:last-child td{ border-bottom:none; }
.empty-row td{ text-align:center; color:var(--text-faint); padding:26px; font-style:italic; }

/* Khusus tabel Record Daily Maintenance: teks rata tengah biar rapi.
   Kolom deskripsi panjang (Breakdown Deskripsi, Repair Action, Keterangan) tetap rata kiri agar mudah dibaca. */
#daily-record-table th, #daily-record-table td{ text-align:center; }
#daily-record-table td:nth-child(17), #daily-record-table td:nth-child(18), #daily-record-table td:nth-child(22){ text-align:left; }

.pill{ display:inline-block; padding:3px 9px; border-radius:20px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; font-family:'JetBrains Mono',monospace;}
.pill.open{ background:rgba(229,72,77,0.15); color:var(--red); }
.pill.progress{ background:rgba(255,199,44,0.15); color:var(--yellow); }
.pill.close{ background:rgba(76,175,109,0.15); color:var(--green); }
.pill.overdue{ background:rgba(229,72,77,0.15); color:var(--red); }
.pill.planned{ background:rgba(74,144,217,0.15); color:var(--blue); }
.pill.done{ background:rgba(76,175,109,0.15); color:var(--green); }
select.exec-open, select.exec-close{ font-family:inherit; font-size:12px; font-weight:600; border-radius:6px; padding:4px 8px; border:1px solid var(--line); cursor:pointer; }
select.exec-open{ background:rgba(255,199,44,0.15); color:var(--yellow); }
select.exec-close{ background:rgba(76,175,109,0.15); color:var(--green); }
.cat{ display:inline-block; padding:2px 8px; border-radius:2px; font-size:10px; font-weight:700; font-family:'JetBrains Mono',monospace; }
.cat.Breakdown{ background:rgba(229,72,77,0.15); color:var(--red); }
.cat.Daily{ background:rgba(74,144,217,0.15
